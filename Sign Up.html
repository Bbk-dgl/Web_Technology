<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - Explore Dolakha</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<style>
  body {
    background: linear-gradient(135deg, #0dcaf0, #198754);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', sans-serif;
  }
  .card { border-radius: 20px; overflow: hidden; }
  .card-body { padding: 2rem; }
  h3.card-title { font-weight: 700; color: #198754; }
  .form-control { border-radius: 50px; padding: 0.75rem 1rem; }
  .btn-primary { border-radius: 50px; background: #198754; border: none; }
  .btn-primary:hover { background: #0dcaf0; }
  p.text-center a { color: #0dcaf0; font-weight: 600; text-decoration: none; }
</style>
</head>
<body>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-lg">
        <div class="card-body">
          <h3 class="card-title text-center mb-4">Sign Up</h3>
          <form id="signupForm">
            <div class="mb-3">
              <label for="fullname" class="form-label">Full Name</label>
              <input type="text" class="form-control" id="fullname" placeholder="Enter full name" required>
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Email address</label>
              <input type="email" class="form-control" id="email" placeholder="Enter email" required>
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" class="form-control" id="password" placeholder="Enter password" required>
            </div>
            <div class="mb-3">
              <label for="confirmPassword" class="form-label">Confirm Password</label>
              <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm password" required>
            </div>
            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary btn-lg">Sign Up</button>
            </div>
          </form>
          <p class="text-center mt-3">Already have an account? <a href="login.html">Login</a></p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
document.getElementById('signupForm').addEventListener('submit', function(e){
  e.preventDefault();

  const fullname = document.getElementById('fullname').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  if(password !== confirmPassword){
    alert("Passwords do not match!");
    return;
  }

  const users = JSON.parse(localStorage.getItem('users') || '[]');

  if(users.some(u => u.email === email)){
    alert("Email already registered!");
    return;
  }

  users.push({fullname, email, password});
  localStorage.setItem('users', JSON.stringify(users));

  alert("Sign Up Successful! Redirecting to Login page...");
  window.location.href = "login.html";
});
</script>

</body>
</html>
