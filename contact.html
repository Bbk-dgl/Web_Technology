    <!-- Contact Info -->
    <div class="col-md-5 mb-4">
      <div class="card shadow h-100">
        <div class="card-body">
          <h4 class="mb-4">Get in Touch</h4>

          <p><i class="bi bi-telephone-fill text-primary"></i> +977 9800000000</p>
          <p><i class="bi bi-envelope-fill text-primary"></i> info@exploredolakha.com</p>

          <hr>

          <h5>Follow Us</h5>
          <a href="#" class="text-dark me-3 fs-4"><i class="bi bi-facebook"></i></a>
          <a href="#" class="text-dark me-3 fs-4"><i class="bi bi-instagram"></i></a>

        </div>

    <!-- Contact Form -->
    <div class="col-md-7">
      <div class="card shadow">
        <div class="card-body">
          <h3 class="card-title text-center mb-4">Contact Us</h3>

          <form action="contact-process.php" method="POST">
            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-control" name="name" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" name="email" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Subject</label>
              <input type="text" class="form-control" name="subject" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Message</label>
              <textarea class="form-control" name="message" rows="4" required></textarea>
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-primary">Send Message</button>
            </div>
          </form>

        </div>
      </div>
    </div>

  </div>
